name: backend CI

# Монорепо: GitHub Actions читает workflow только из КОРНЕВОГО .github/workflows.
# Этот job гоняется только при изменениях в mrdk-back/.
on:
  push:
    branches: [main]
    paths: ['mrdk-back/**', '.github/workflows/backend.yml']
  pull_request:
    paths: ['mrdk-back/**', '.github/workflows/backend.yml']

defaults:
  run:
    working-directory: mrdk-back

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20 # совпадает с прод-образом (mrdk-back/Dockerfile)
          cache: npm
          cache-dependency-path: mrdk-back/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

# HTTP :80 — только ACME-проверка и редирект на HTTPS
server {
    listen 80;
    server_name nn-lance.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — основной сервер
server {
    listen 443 ssl;
    http2 on;
    server_name nn-lance.ru;
    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/nn-lance.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nn-lance.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    location /api/ {
        set $backend_upstream http://backend:3001;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 210M;
        proxy_request_buffering off;
    }

    location /health {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        alias /var/www/uploads/;
    }

    location / {
        root /var/www/dist;
        try_files $uri /index.html;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'>
    }
}
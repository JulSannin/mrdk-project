server {
    listen 80;

    # Использовать встроенный DNS Docker
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        # Если backend не отвечает, nginx не упадёт, а вернёт ошибку 502
        set $backend_upstream http://backend:3001;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Загрузка видео к событиям (multer-лимит на бэке — 200 МБ)
        client_max_body_size 210M;
        proxy_request_buffering off;
    }

    location /health {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        alias /var/www/uploads/;
    }

    location / {
        root /var/www/dist;
        try_files $uri /index.html;
        # CSP сайта (nginx — единственный источник правды для браузера; helmet на бэке
        # отдаёт CSP только JSON-ответам API, где скриптов нет).
        # script-src:
        #   'unsafe-eval' — обязателен: загрузчик 2ГИС (script.full.js, pkg=full)
        #                   исполняет код через eval/new Function; без него падает
        #                   с Uncaught EvalError и часть карты не работает.
        #   'unsafe-inline' на style-src — нужен MUI/react-admin и инлайновым стилям.
        #   mc.yandex.ru + mc.yandex.com — Яндекс.Метрика (tag.js грузится с .ru, а
        #     хиты /watch уходят на .com — нужны оба домена в script/connect/img);
        #     maps.api.2gis.ru — загрузчик карты.
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; font-src 'self' data:; script-src 'self' 'unsafe-eval' https://mc.yandex.ru https://mc.yandex.com https://maps.api.2gis.ru; style-src 'self' 'unsafe-inline' https://maps.api.2gis.ru; img-src 'self' data: https://mc.yandex.ru https://mc.yandex.com https://*.maps.2gis.com https://maps.api.2gis.ru; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com wss://mc.yandex.ru wss://mc.yandex.com https://yandex.ru https://*.maps.2gis.com https://maps.api.2gis.ru https://catalog.api.2gis.ru https://keys.api.2gis.com; frame-src https://map.2gis.com https://mc.yandex.ru https://mc.yandex.com" always;
    }
}